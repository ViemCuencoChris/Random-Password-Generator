<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dice Roll Generator</title>
</head>
<body>
    <div class="inputGenerate">
        <h1>Generate Random Password</h1>
        <div class="gen_lbl">
            <label for="genInt">Password Length (8-15): </label>
            <input type="number" id="genInt" value="8" min="8" max="15">
        </div>
        <div class="gen_lbl">
            <div>
                <label for="upper">UpperCase</label>
                <input type="checkbox" id="upper">
            </div>

            <div>
                <label for="lower">LowerCase</label>
                <input type="checkbox" id="lower">
            </div>

            <div>
                <label for="numbers">Numbers</label>
                <input type="checkbox" id="numbers">
            </div>

            <div>
                <label for="special">Special Characters</label>
                <input type="checkbox" id="special">
            </div>
        </div>
        <button onclick="btnGen()">Generate</button>
        <p id="psd"></p>
    </div>

    <script src="main.js"></script>
</body>
</html>
